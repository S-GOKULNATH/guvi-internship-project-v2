<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Welcome to GUVI Project</title>

    <meta http-equiv="refresh" content="3; url=register.html">

    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
            background-color: #f4f6f9;
            position: relative;
        }

        h1 {
            font-size: 28px;
            color: #0d6efd;
            margin-bottom: 10px;
        }

        p {
            font-size: 16px;
            color: #555;
        }

        .loader {
            margin-top: 20px;
            width: 40px;
            height: 40px;
            border: 4px solid #ddd;
            border-top: 4px solid #0d6efd;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

    
        .credit {
            position: absolute;
            top: 5px;
            right: 8px;
            font-size: 8px;
            color: rgba(0, 0, 0, 0.15);
            font-family: Arial, sans-serif;
        }
    </style>
</head>

<body>

    <div class="credit">arulambalam</div>


    <h1>Welcome to GUVI Project</h1>
    <p>Redirecting to Register Page...</p>

    <div class="loader"></div>

</body>
</html>
